<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#D4845A"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D4845A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C4956A" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="114" ry="114" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight top-left -->
  <rect width="512" height="512" rx="114" ry="114" fill="rgba(255,255,255,0.07)"/>
  <rect x="1" y="1" width="510" height="260" rx="113" ry="113" fill="rgba(255,255,255,0.05)"/>

  <!-- Outer flame — white, slightly transparent -->
  <path d="
    M256 72
    C256 72 170 180 170 282
    C170 333 209 374 256 374
    C303 374 342 333 342 282
    C342 180 256 72 256 72 Z
  " fill="white" opacity="0.95" filter="url(#softGlow)"/>

  <!-- Inner flame core — terracotta gradient for depth -->
  <path d="
    M256 168
    C256 168 214 232 214 282
    C214 308 233 330 256 330
    C279 330 298 308 298 282
    C298 232 256 168 256 168 Z
  " fill="url(#innerGrad)"/>

  <!-- Tiny highlight dot at top of outer flame -->
  <ellipse cx="244" cy="120" rx="12" ry="18" fill="white" opacity="0.25" transform="rotate(-10, 244, 120)"/>
</svg>
